services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: budinfo
      POSTGRES_PASSWORD: budinfo_dev_password
      POSTGRES_DB: app_development
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budinfo -d app_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -c "rm -f tmp/pids/server.pid && bin/rails tailwindcss:build && (bin/rails tailwindcss:watch &) && exec bin/rails server -b 0.0.0.0 -p 3000"
    volumes:
      - .:/app
      - bundle_data:/usr/local/bundle
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgres://budinfo:budinfo_dev_password@db:5432/app_development
      RAILS_ENV: development
      # Browser hits localhost:3001; Disk/redirect URLs must use the same port
      DEV_URL_OPTIONS_PORT: "3001"
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-pgadmin_dev_password}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  postgres_data:
  bundle_data:
  pgadmin_data:
